name: Build and Update Plugin

on:
  push:
    branches:
      - main  # або master, залежно від твоєї назви
    paths:
      - 'src/**' # Запускати тільки якщо змінився код

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Важливо для запису в репозиторій

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add main.js manifest.json styles.css # Додай файли, які треба оновити
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-build: update plugin files" && git push)