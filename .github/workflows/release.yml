name: Build and Update Plugin

on:
  push:
    branches:
      - master 
    paths:
      - 'src/**'
      - '.github/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Commit and Push changes
        run: |
          git config --local user.email "arseniu437@gmail.com"
          git config --local user.name "MrArsars"
          git add main.js manifest.json styles.css .github/workflows/*.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-build: update plugin files" && git push)